name: v2 Daily Preflight + Full Run Gate

# Push 또는 PR 발생 시 자동으로 v2 파이프라인 정합성 점검.
# 사람이 매일 손으로 daily.sh를 돌릴 필요 없게 함.
# Workflow_dispatch로 수동 실행도 가능 (단톡 보고용 즉시 점검).
#
# 점검 범위 (daily.sh + gate_check.py와 동일):
#   1. compileall pipeline / scripts
#   2. config 유효성 (configs/v2_15seed.json)
#   3. CLI help
#   4. plan/status (manifest + execution_status)
#   5. dry-run benchmark (A_B/D_B seed 42)
#   6. scaffolding stages (aggregate / xai-bundle / report / dashboard 빈 입력)
#   7. failed_runs.csv / completed_runs.csv 행 수
#   8. Full Run Gate 6조건 (cudnn 제외, --skip-sample-check)

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/preflight.yml'
  pull_request:
    branches: [main]
    paths:
      - 'v2/**'
  workflow_dispatch:   # 수동 트리거 — 1번이 GitHub UI에서 클릭

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install preflight deps
        run: |
          python -m pip install --upgrade pip
          # daily.sh itself is GPU-free, but gate_check imports runtime/experiment_core.
          # That import path needs the core training stack even when CUDA is absent.
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          python -m pip install \
            numpy \
            pandas \
            scipy \
            statsmodels \
            matplotlib \
            seaborn \
            scikit-learn \
            transformers \
            vaderSentiment

      - name: Run v2 preflight (daily.sh)
        working-directory: v2
        run: |
          chmod +x scripts/daily.sh scripts/gate_check.py
          ./scripts/daily.sh

      - name: Upload preflight artifacts (실패 시 디버깅용)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preflight-outputs
          path: |
            v2/outputs/experiments/v2_15seed/execution_status.csv
            v2/outputs/experiments/v2_15seed/failed_runs.csv
            v2/outputs/experiments/v2_15seed/completed_runs.csv
            v2/outputs/experiments/v2_15seed/benchmark/*.csv
          if-no-files-found: warn
          retention-days: 14
